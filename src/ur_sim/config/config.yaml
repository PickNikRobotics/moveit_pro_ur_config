based_on_package: ur_mock
hardware:
  robot_description:
    urdf:
      package: "ur_sim"
      path: "description/picknik_ur.xacro"
    srdf:
      package: "ur_mock"
      path: "config/moveit/picknik_ur.srdf"
    # Specify any additional parameters required for the URDF.
    # Many of these are specific to the UR descriptions packages, and can be customized as needed.
    # [Optional]
    urdf_params:
      - name: "ur7e"
      # NOTE: If using a different UR model, update type here and joint limits in the config/moveit/joint_limits.yaml file.
      # possible 'ur_type' values: ur3, ur3e, ur5, ur5e, ur7, ur7e, ur10, ur10e, ur16e, ur20, ur30
      - ur_type: "ur7e"
      - use_fake_hardware: "true"
      - robot_ip: "0.0.0.0"
      - headless_mode: "true"
      - use_tool_communication: "true"
      - tool_voltage: "24"
      - joint_limit_parameters_file:
          package: "ur_mock"
          path: "config/moveit/joint_limits.yaml"
